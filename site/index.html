<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>git.joshlynes.com</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #58a6ff; }
    p.sub { color: #8b949e; margin-bottom: 2rem; font-size: 1.1rem; }
    .projects { display: flex; flex-direction: column; gap: 1rem; max-width: 500px; width: 100%; }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      text-decoration: none;
      color: #c9d1d9;
      transition: border-color 0.2s, background 0.2s;
    }
    .card:hover { border-color: #58a6ff; background: #1c2128; }
    .card h2 { font-size: 1.25rem; color: #58a6ff; margin-bottom: 0.3rem; }
    .card p { color: #8b949e; font-size: 0.9rem; }
    .card .tag { display: inline-block; background: #1f6feb22; color: #58a6ff; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; margin-top: 0.5rem; }
    footer { margin-top: 3rem; color: #484f58; font-size: 0.8rem; }
    footer a { color: #8b949e; }
  </style>
</head>
<body>
  <h1>git.joshlynes.com</h1>
  <p class="sub">Open-source projects by Josh Lynes (CanadianCowboy)</p>

  <div class="projects">
    <a href="/a2x" class="card">
      <h2>A2X</h2>
      <p>AI-native programming language and runtime. Sigma ISA, Omega compiler, CCS cognitive VM.</p>
      <span class="tag">Rust</span>
      <span class="tag">AGPL-3.0</span>
      <span class="tag">v0.9.0-alpha</span>
    </a>

    <div class="card" style="opacity: 0.5;">
      <h2>More coming soon</h2>
      <p>New projects will appear here. Watch this space.</p>
    </div>
  </div>

  <footer>
    <a href="https://github.com/CanadianCowboy">github.com/CanadianCowboy</a>
  </footer>
</body>
</html>
