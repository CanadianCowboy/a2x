# CLA Assistant Lite — asks first-time contributors to sign the CLA before their PR can merge.
#
# How it works:
# 1. When a PR is opened (or comment added), this workflow runs.
# 2. On a first-time contributor's PR, the bot posts a comment linking to CLA.md
#    and asks them to reply with the sign-off text.
# 3. When they comment "I have read the CLA Document and I hereby sign the CLA",
#    the bot records their GitHub username in signatures/version1/cla.json
#    (auto-committed by the bot) and marks the CLA check as passing.
# 4. Subsequent PRs from the same contributor are auto-approved for CLA status.
#
# Maintainer setup (one-time):
# - Create a Personal Access Token (PAT) with `repo` scope:
#     https://github.com/settings/tokens
#   (Classic PAT with `repo` scope, or a fine-grained PAT with read/write access
#   to Contents and Pull requests on this repo.)
# - Add it as a repository secret named `PERSONAL_ACCESS_TOKEN`:
#     Repo Settings → Secrets and variables → Actions → New repository secret
# - On the first PR signed, the workflow will auto-create `signatures/version1/cla.json`.
#
# See: https://github.com/contributor-assistant/github-action

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

# Explicitly configure permissions so this workflow only touches what it needs.
permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PERSONAL_ACCESS_TOKEN must be set in repo secrets — see header comment.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/CanadianCowboy/a2x/blob/master/CLA.md'
          branch: 'master'
          # Skip the CLA check for the maintainer and standard bots.
          allowlist: 'dependabot[bot],copilot[bot],CanadianCowboy'
          remote-organization-name: 'CanadianCowboy'
          remote-repository-name: 'a2x'
          custom-notsigned-prcomment: 'Thanks for your contribution! Before we can merge this, please sign our [Contributor License Agreement](https://github.com/CanadianCowboy/a2x/blob/master/CLA.md) by commenting the following on this PR (one line, exact text):'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. Ready for review.'
          lock-pullrequest-aftermerge: false
